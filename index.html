<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語音對話 Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 { color: #00d4ff; text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
    
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .chat-container {
      height: 300px;
      overflow-y: auto;
      padding: 16px;
      background: #0f3460;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .message {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 85%;
      word-wrap: break-word;
    }
    .message.user {
      background: #00d4ff20;
      color: #00d4ff;
      margin-left: auto;
    }
    .message.ai {
      background: #16213e;
      color: #fff;
    }
    .message.system {
      background: #ff6b6b20;
      color: #ff6b6b;
      font-size: 12px;
      text-align: center;
    }
    
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .record-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid #00d4ff;
      background: #0f3460;
      color: #00d4ff;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .record-btn:hover { background: #00d4ff20; }
    .record-btn.recording {
      background: #ff4444;
      border-color: #ff4444;
      color: #fff;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .text-input {
      flex: 1;
      padding: 14px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #0f3460;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .text-input:focus { border-color: #00d4ff; }
    
    .send-btn {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background: #00d4ff;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .status {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }
    .status.loading { display: block; background: #00d4ff20; color: #00d4ff; }
    .status.error { display: block; background: #ff444420; color: #ff6666; }
    .status.success { display: block; background: #44ff4420; color: #66ff66; }
    
    .settings {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 16px;
    }
    .settings input {
      background: #0f3460;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      color: #fff;
      width: 200px;
    }
    .settings label { margin-left: 10px; }
    
    .api-section {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .api-section input {
      flex: 1;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 14px;
    }
    
    audio.response-audio {
      width: 100%;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>🎙️ 語音對話</h1>
  <p class="subtitle">語音輸入 → AI 回覆 → 語音輸出</p>
  
  <div class="card">
    <div class="api-section">
      <input type="text" id="backendUrl" placeholder="後端 URL" value="https://voice-chat-backend-production.up.railway.app">
    </div>
    <div class="api-section">
      <input type="text" id="apiKey" placeholder="OpenAI 或 MiniMax API Key">
    </div>
    
    <div class="chat-container" id="chatContainer">
      <div class="message system">系統就緒，請輸入 API Key 開始對話</div>
    </div>
    
    <div class="controls">
      <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤</button>
      <input type="text" class="text-input" id="textInput" placeholder="或直接輸入文字..." onkeypress="handleKeyPress(event)">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">發送</button>
    </div>
    
    <div id="status" class="status"></div>
    <audio id="responseAudio" class="response-audio" controls></audio>
  </div>
  
  <div class="settings">
    <label>提供商：</label>
    <select id="provider" onchange="updateVoices()">
      <option value="openai">OpenAI</option>
      <option value="minimax">MiniMax</option>
    </select>
    <label>語音：</label>
    <select id="voice">
      <option value="alloy">Alloy</option>
      <option value="nova">Nova</option>
      <option value="echo">Echo</option>
    </select>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    
    const minimaxVoices = ['Wise_Woman', 'Friendly_Person', 'Deep_Voice_Man', 'Calm_Woman'];
    
    function updateVoices() {
      const provider = document.getElementById('provider').value;
      const voiceSelect = document.getElementById('voice');
      
      if (provider === 'minimax') {
        voiceSelect.innerHTML = minimaxVoices.map(v => `<option value="${v}">${v.replace(/_/g, ' ')}</option>`).join('');
      } else {
        voiceSelect.innerHTML = `
          <option value="alloy">Alloy</option>
          <option value="nova">Nova</option>
          <option value="echo">Echo</option>
          <option value="fable">Fable</option>
          <option value="onyx">Onyx</option>
          <option value="shimmer">Shimmer</option>
        `;
      }
    }
    
    async function toggleRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        await startRecording();
      }
    }
    
    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Try different MIME types for better compatibility
        let mimeType = 'audio/webm;codecs=opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
          mimeType = 'audio/webm';
          if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = 'audio/ogg';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
              mimeType = 'audio/mp4';
            }
          }
        }
        
        console.log('Using MIME type:', mimeType);
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks = [];
        
        mediaRecorder.ondataavailable = event => {
          console.log('Data available:', event.data.size, 'bytes');
          audioChunks.push(event.data);
        };
        
        mediaRecorder.onstop = async () => {
          console.log('Recording stopped, chunks:', audioChunks.length);
          if (audioChunks.length === 0) {
            showStatus('沒有錄到音頻，請再試一次', 'error');
            return;
          }
          
          const audioBlob = new Blob(audioChunks, { type: mimeType });
          console.log('Blob size:', audioBlob.size, 'bytes');
          
          const reader = new FileReader();
          reader.onload = () => {
            const base64 = reader.result.split(',')[1];
            console.log('Base64 length:', base64.length);
            sendAudio(base64);
          };
          reader.onerror = () => {
            showStatus('音頻處理失敗', 'error');
          };
          reader.readAsDataURL(audioBlob);
          
          stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.onerror = (e) => {
          console.error('MediaRecorder error:', e);
          showStatus('錄音失敗: ' + e.error?.message, 'error');
        };
        
        mediaRecorder.start(1000); // Collect data every second
        isRecording = true;
        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('recordBtn').textContent = '⏹';
        showStatus('錄音中...', 'loading');
        
      } catch (error) {
        console.error('Microphone access error:', error);
        showStatus('無法訪問麥克風: ' + error.message, 'error');
      }
    }
    
    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('recordBtn').classList.remove('recording');
        document.getElementById('recordBtn').textContent = '🎤';
      }
    }
    
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }
    
    async function sendMessage() {
      const text = document.getElementById('textInput').value.trim();
      const backendUrl = document.getElementById('backendUrl').value.trim();
      
      if (!backendUrl) {
        showStatus('請輸入後端 URL', 'error');
        return;
      }
      
      if (!text) {
        showStatus('請輸入文字', 'error');
        return;
      }
      
      addMessage('user', text);
      document.getElementById('textInput').value = '';
      
      await chat(text, backendUrl);
    }
    
    async function sendAudio(base64) {
      const backendUrl = document.getElementById('backendUrl').value.trim();
      
      if (!backendUrl) {
        showStatus('請輸入後端 URL', 'error');
        return;
      }
      
      if (!base64 || base64.length < 100) {
        showStatus('音頻數據無效', 'error');
        return;
      }
      
      showStatus('辨識中...', 'loading');
      
      try {
        const response = await fetch(backendUrl + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            audio: base64,
            provider: document.getElementById('provider').value
          })
        });
        
        if (!response.ok) {
          throw new Error('Server error: ' + response.status);
        }
        
        const data = await response.json();
        
        if (data.error) {
          throw new Error(data.error);
        }
        
        // Show transcription
        addMessage('user', `🎤 ${data.transcription}`);
        
        // Show AI response
        addMessage('ai', data.response);
        
        // Play audio response
        if (data.audio) {
          const audio = document.getElementById('responseAudio');
          audio.src = 'data:audio/mp3;base64,' + data.audio;
          audio.style.display = 'block';
          audio.play().catch(() => {});
        }
        
        showStatus('完成', 'success');
        
      } catch (error) {
        console.error('Chat error:', error);
        showStatus('錯誤: ' + error.message, 'error');
      }
    }
      
      try {
        const response = await fetch(backendUrl + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            audio: base64,
            provider: document.getElementById('provider').value
          })
        });
        
        const data = await response.json();
        
        if (data.error) {
          showStatus(data.error, 'error');
          return;
        }
        
        // Show transcription
        addMessage('user', `🎤 ${data.transcription}`);
        
        // Show AI response
        addMessage('ai', data.response);
        
        // Play audio response
        if (data.audio) {
          const audio = document.getElementById('responseAudio');
          audio.src = 'data:audio/mp3;base64,' + data.audio;
          audio.style.display = 'block';
          audio.play().catch(() => {});
        }
        
        showStatus('完成', 'success');
        
      } catch (error) {
        showStatus('錯誤: ' + error.message, 'error');
      }
    }
    
    async function chat(text, backendUrl) {
      showStatus('處理中...', 'loading');
      
      try {
        const response = await fetch(backendUrl + '/text-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        
        const data = await response.json();
        
        if (data.error) {
          showStatus(data.error, 'error');
          return;
        }
        
        addMessage('ai', data.response);
        
        // Also convert to speech
        showStatus('生成語音...', 'loading');
        
        const ttsResponse = await fetch(backendUrl + '/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            text: data.response,
            provider: document.getElementById('provider').value,
            voice: document.getElementById('voice').value
          })
        });
        
        const ttsData = await ttsResponse.json();
        
        if (ttsData.audio) {
          const audio = document.getElementById('responseAudio');
          audio.src = 'data:audio/mp3;base64,' + ttsData.audio;
          audio.style.display = 'block';
          audio.play().catch(() => {});
        }
        
        showStatus('完成', 'success');
        
      } catch (error) {
        showStatus('錯誤: ' + error.message, 'error');
      }
    }
    
    function addMessage(type, text) {
      const container = document.getElementById('chatContainer');
      const div = document.createElement('div');
      div.className = 'message ' + type;
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
    
    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
      if (type !== 'loading') {
        setTimeout(() => { el.style.display = 'none'; }, 3000);
      }
    }
    }); // end DOMContentLoaded
  </script>
</body>
</html>
