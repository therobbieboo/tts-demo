<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語音合成 Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 { color: #00d4ff; text-align: center; margin-bottom: 30px; }
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
    textarea {
      width: 100%;
      height: 120px;
      padding: 14px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #0f3460;
      color: #fff;
      font-size: 16px;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #00d4ff; }
    
    .provider-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .provider-tab {
      flex: 1;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #0f3460;
      color: #aaa;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      transition: all 0.2s;
    }
    .provider-tab:hover { border-color: #00d4ff; color: #fff; }
    .provider-tab.selected { border-color: #00d4ff; background: #00d4ff20; color: #00d4ff; }
    
    .voice-section { display: none; }
    .voice-section.active { display: block; }
    
    .voice-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .voice-btn {
      padding: 10px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f3460;
      color: #aaa;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .voice-btn:hover { border-color: #00d4ff; color: #fff; }
    .voice-btn.selected { border-color: #00d4ff; background: #00d4ff20; color: #00d4ff; }
    
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #0f3460;
      color: #fff;
      font-size: 16px;
      outline: none;
      margin-top: 10px;
    }
    input:focus { border-color: #00d4ff; }
    
    .warning {
      background: #ff6b6b20;
      border: 1px solid #ff6b6b;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      font-size: 12px;
      color: #ff6b6b;
    }
    
    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      margin-top: 16px;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .status {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
      font-size: 14px;
    }
    .status.loading { display: block; background: #00d4ff20; color: #00d4ff; }
    .status.error { display: block; background: #ff444420; color: #ff6666; }
    .status.success { display: block; background: #44ff4420; color: #66ff66; }
    
    audio { width: 100%; margin-top: 16px; display: none; }
    .info { font-size: 12px; color: #666; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <h1>🔊 語音合成 Demo</h1>
  
  <div class="card">
    <label>輸入文字</label>
    <textarea id="text" placeholder="在這裡輸入你想要轉換語音的文字...">你好！這是一個語音合成測試。</textarea>
  </div>

  <div class="card">
    <label>選擇提供商</label>
    <div class="provider-tabs">
      <button class="provider-tab selected" data-provider="openai">OpenAI</button>
      <button class="provider-tab" data-provider="minimax">MiniMax</button>
    </div>
    
    <div id="openai-voices" class="voice-section active">
      <label>選擇語音 (OpenAI)</label>
      <div class="voice-grid">
        <button class="voice-btn selected" data-voice="alloy">Alloy</button>
        <button class="voice-btn" data-voice="echo">Echo</button>
        <button class="voice-btn" data-voice="fable">Fable</button>
        <button class="voice-btn" data-voice="onyx">Onyx</button>
        <button class="voice-btn" data-voice="nova">Nova</button>
        <button class="voice-btn" data-voice="shimmer">Shimmer</button>
      </div>
    </div>
    
    <div id="minimax-voices" class="voice-section">
      <label>選擇語音 (MiniMax)</label>
      <div class="voice-grid">
        <button class="voice-btn selected" data-voice="Wise_Woman">Wise Woman</button>
        <button class="voice-btn" data-voice="Friendly_Person">Friendly Person</button>
        <button class="voice-btn" data-voice="Inspirational_girl">Inspirational Girl</button>
        <button class="voice-btn" data-voice="Deep_Voice_Man">Deep Voice Man</button>
        <button class="voice-btn" data-voice="Calm_Woman">Calm Woman</button>
        <button class="voice-btn" data-voice="Casual_Guy">Casual Guy</button>
        <button class="voice-btn" data-voice="Lively_Girl">Lively Girl</button>
        <button class="voice-btn" data-voice="Patient_Man">Patient Man</button>
        <button class="voice-btn" data-voice="Young_Knight">Young Knight</button>
        <button class="voice-btn" data-voice="Determined_Man">Determined Man</button>
        <button class="voice-btn" data-voice="Lovely_Girl_2">Lovely Girl 2</button>
        <button class="voice-btn" data-voice="Sweet_Girl_2">Sweet Girl 2</button>
      </div>
    </div>
    
    <input type="text" id="apiKey" placeholder="API Key（必填）">
    <div class="warning">⚠️ API Key 會存在瀏覽器本地，端必須你自己保管好</div>
  </div>

  <button id="speak" onclick="speak()">▶ 生成語音</button>
  
  <div id="status" class="status"></div>
  <audio id="audio" controls></audio>

  <script>
    let selectedProvider = 'openai';
    let selectedVoice = 'alloy';
    
    // Provider tab switching
    document.querySelectorAll('.provider-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.provider-tab').forEach(t => t.classList.remove('selected'));
        tab.classList.add('selected');
        selectedProvider = tab.dataset.provider;
        
        document.querySelectorAll('.voice-section').forEach(s => s.classList.remove('active'));
        if (selectedProvider === 'openai') {
          document.getElementById('openai-voices').classList.add('active');
          selectedVoice = 'alloy';
          updateOpenAIVoices();
        } else {
          document.getElementById('minimax-voices').classList.add('active');
          selectedVoice = 'Wise_Woman';
          updateMinimaxVoices();
        }
      });
    });
    
    function updateOpenAIVoices() {
      document.querySelectorAll('#openai-voices .voice-btn').forEach(btn => {
        btn.classList.remove('selected');
        if (btn.dataset.voice === 'alloy') btn.classList.add('selected');
      });
    }
    
    function updateMinimaxVoices() {
      document.querySelectorAll('#minimax-voices .voice-btn').forEach(btn => {
        btn.classList.remove('selected');
        if (btn.dataset.voice === 'Wise_Woman') btn.classList.add('selected');
      });
    }
    
    // Voice selection
    document.querySelectorAll('.voice-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const section = btn.closest('.voice-section');
        section.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedVoice = btn.dataset.voice;
      });
    });

    async function speak() {
      const text = document.getElementById('text').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      
      if (!text) { showStatus('請輸入文字', 'error'); return; }
      if (!apiKey) { showStatus('請輸入 API Key', 'error'); return; }

      const btn = document.getElementById('speak');
      const status = document.getElementById('status');
      const audio = document.getElementById('audio');
      
      btn.disabled = true;
      showStatus('生成中...', 'loading');
      audio.style.display = 'none';

      try {
        let audioBlob;
        
        if (selectedProvider === 'minimax') {
          // MiniMax TTS
          const response = await fetch('https://api.minimax.io/v1/t2a_v2', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'speech-02-hd',
              text,
              stream: false,
              voice_setting: {
                voice_id: selectedVoice
              },
              audio_setting: {
                sample_rate: 32000,
                format: 'mp3'
              }
            })
          });

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.base_resp?.status_msg || 'MiniMax API 錯誤');
          }

          const data = await response.json();
          if (data.base_resp?.status_code !== 0) {
            throw new Error(data.base_resp?.status_msg || 'MiniMax API 錯誤');
          }
          
          // MiniMax returns audio as HEX string
          const audioBuffer = hexToArrayBuffer(data.data.audio);
          audioBlob = new Blob([audioBuffer], { type: 'audio/mpeg' });
          
        } else {
          // OpenAI TTS
          const response = await fetch('https://api.openai.com/v1/audio/speech', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'gpt-4o-mini-tts',
              voice: selectedVoice,
              input: text,
              response_format: 'mp3'
            })
          });

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error?.message || 'OpenAI API 錯誤');
          }

          audioBlob = await response.blob();
        }

        const url = URL.createObjectURL(audioBlob);
        audio.src = url;
        audio.style.display = 'block';
        showStatus('成功！', 'success');
        audio.play().catch(() => {});
        
      } catch (e) {
        showStatus(e.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function hexToArrayBuffer(hex) {
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < hex.length; i += 2) {
        bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
      }
      return bytes.buffer;
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }
  </script>
</body>
</html>
